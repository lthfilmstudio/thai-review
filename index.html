<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F1814" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="清心安神">
<title>清心安神</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500&family=Noto+Sans+Thai:wght@400;500&family=Inter:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="top-left">
    <button class="top-btn" id="btnMenu" aria-label="選單" title="課程選單">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <button class="top-btn" id="btnSearch" aria-label="搜尋" title="搜尋 (/)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
  </div>
  <div class="top-center">
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="card"><span class="thai">อักษรไทย</span></button>
      <button class="mode-tab" data-mode="reverse">中文</button>
      <button class="mode-tab" data-mode="listen">自動播放</button>
    </div>
    <div class="top-title" id="topTitle">清心安神</div>
  </div>
  <div class="top-right">
    <button class="top-btn" id="btnShuffle" aria-label="隨機打亂" title="隨機打亂 (S)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
    </button>
    <button class="top-btn" id="btnSettings" aria-label="設定" title="設定">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- Mobile mode picker -->
<div class="mode-picker-mobile" id="modePicker">
  <button class="mp-btn active" data-mode="card"><span class="thai">อักษรไทย</span></button>
  <button class="mp-btn" data-mode="reverse">中文</button>
  <button class="mp-btn" data-mode="listen">自動播放</button>
</div>

<!-- Main -->
<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="side-label">課程</div>
    <div id="sideList"></div>
  </aside>

  <section class="content" id="content"></section>

  <aside class="stats">
    <div class="stats-title">本堂統計</div>
    <div class="stat-box gold"><div class="stat-label">會了</div><div class="stat-val" id="statGood">0</div></div>
    <div class="stat-box"><div class="stat-label">普通</div><div class="stat-val" id="statOk">0</div></div>
    <div class="stat-box red"><div class="stat-label">不熟</div><div class="stat-val" id="statBad">0</div></div>
    <div class="shortcuts">
      <div><span class="kbd">←</span> <span class="kbd">→</span> 切卡</div>
      <div><span class="kbd">Space</span> 翻面</div>
      <div><span class="kbd">1</span> <span class="kbd">2</span> <span class="kbd">3</span> 評估</div>
      <div><span class="kbd">P</span> 播放</div>
      <div><span class="kbd">S</span> 隨機</div>
      <div><span class="kbd">/</span> 搜尋</div>
    </div>
  </aside>
</div>

<!-- Drawer (mobile) -->
<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-title">模式</div>
  <button class="drawer-item active" data-drawer-mode="card"><span class="thai">อักษรไทย</span></button>
  <button class="drawer-item" data-drawer-mode="reverse">中文</button>
  <button class="drawer-item" data-drawer-mode="listen">自動播放</button>
  <div class="side-divider"></div>
  <div class="drawer-title">課程</div>
  <div id="drawerList"></div>
</aside>

<!-- Settings modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">設定</div>
      <button class="modal-close" id="btnCloseModal" aria-label="關閉">✕</button>
    </div>

    <div class="field">
      <label class="field-label">Google Sheet 網址（選填）</label>
      <textarea id="inpSheet" rows="2" placeholder="留空則使用預設 Sheet"></textarea>
      <div class="field-hint">
        留空 → 用內建預設（Nalin 的課本 Sheet）。<br>
        要換：貼「發佈到網路 → 整個文件」的 URL，自動列每個 tab 當一堂課；或單一 CSV URL（output=csv）；或多行 CSV URL 一行一堂。
      </div>
    </div>

    <div class="field">
      <label class="field-label">語速（TTS 倍率）</label>
      <div class="seg" id="segRate">
        <button class="seg-btn" data-rate="0.6">0.6×</button>
        <button class="seg-btn" data-rate="0.8">0.8×</button>
        <button class="seg-btn active" data-rate="1">1×</button>
        <button class="seg-btn" data-rate="1.2">1.2×</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">被動聽力重複次數</label>
      <div class="seg" id="segRepeat">
        <button class="seg-btn" data-repeat="1">1×</button>
        <button class="seg-btn" data-repeat="2">2×</button>
        <button class="seg-btn active" data-repeat="3">3×</button>
        <button class="seg-btn" data-repeat="4">4×</button>
        <button class="seg-btn" data-repeat="5">5×</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">跟讀間隔（秒）</label>
      <div class="seg" id="segGap">
        <button class="seg-btn" data-gap="auto">自動</button>
        <button class="seg-btn" data-gap="1">1s</button>
        <button class="seg-btn active" data-gap="2">2s</button>
        <button class="seg-btn" data-gap="3">3s</button>
        <button class="seg-btn" data-gap="4">4s</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">主題</label>
      <div class="seg" id="segTheme">
        <button class="seg-btn" data-theme="auto">自動</button>
        <button class="seg-btn active" data-theme="dark">深色</button>
        <button class="seg-btn" data-theme="light">淺色</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn ghost" id="btnResetProgress">重置進度</button>
      <button class="btn primary" id="btnSaveSettings">儲存</button>
    </div>
  </div>
</div>

<!-- Search modal -->
<div class="modal-mask" id="searchMask">
  <div class="modal search-modal">
    <div class="modal-head">
      <input class="search-input" id="inpSearch" placeholder="搜尋 — 中文 / 泰文 / 拼音" autocomplete="off">
      <button class="modal-close" id="btnCloseSearch" aria-label="關閉">✕</button>
    </div>
    <div class="search-meta" id="searchMeta"></div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- Silent loop audio for Media Session (keeps session alive on lock-screen) -->
<audio id="silentLoop" loop preload="auto" playsinline crossorigin="anonymous"
       src="data:audio/wav;base64,UklGRhwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>

<script type="module" src="src/app.js"></script>
</body>
</html>
